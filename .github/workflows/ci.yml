name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  frontend-core:
    name: Frontend Lint Typecheck Build Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  backend-core:
    name: Backend Format Vet Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Check gofmt
        run: |
          test -z "$(gofmt -l .)" || (echo "Run gofmt on backend files" && gofmt -l . && exit 1)

      - name: Go vet
        run: go vet ./...

      - name: Go tests
        run: go test ./...

